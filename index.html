<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Task Tracker</h1>
    </header>

    <main>

        <!-- Task Form -->
        <section>

            <h2>Add New Task</h2>

            <form id="task-form">

                <div>

                    <label for="task-name">
                        Task Name
                    </label>

                    <input
                        type="text"
                        id="task-name"
                        required>

                </div>

                <div>

                    <label for="priority">
                        Priority
                    </label>

                    <select
                        id="priority"
                        required>

                        <option value="Low">Low</option>

                        <option value="Medium">Medium</option>

                        <option value="High">High</option>

                    </select>

                </div>

                <div>

                    <label for="due-date">
                        Due Date
                    </label>

                    <input
                        type="date"
                        id="due-date"
                        required>

                </div>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </section>

        <!-- Task List -->
        <section>

            <h2>Task List</h2>

            <ul id="task-list">

            </ul>

            <button id="clear-all">
                Clear All
            </button>

        </section>

        <!-- Summary Table -->
        <section>

            <h2>Task Summary</h2>

            <table>

                <thead>

                    <tr>

                        <th>Task</th>

                        <th>Priority</th>

                        <th>Due Date</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="summary-body">

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Task Tracker
        </p>

    </footer>

    <script src="main.js"></script>

</body>

</html>
